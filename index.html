<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEIZ404 // UGC</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --accent: #ffffff; --secondary: #111111; --border: #222222; --font-main: 'Space Grotesk', sans-serif; --font-mono: 'JetBrains Mono', monospace; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background-color: var(--bg); color: var(--accent); font-family: var(--font-main); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        body::before { content: ""; position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(255,255,255,0.03) 50%, rgba(0,0,0,0.3) 50%), linear-gradient(90deg, rgba(255,255,255,0.02) 50%, transparent 50%); background-size: 100% 2px, 4px 100%; pointer-events: none; z-index: 10; }
        .container { width: 100%; max-width: 720px; padding: 30px 20px; z-index: 20; }
        .header { text-align: left; margin-bottom: 20px; border-left: 2px solid var(--accent); padding-left: 20px; }
        .header h1 { font-size: 2.6rem; font-weight: 700; letter-spacing: -3px; text-transform: uppercase; line-height: 0.9; }
        .header p { font-size: 0.8rem; color: #aaaaaa; text-transform: uppercase; letter-spacing: 2px; margin-top: 4px; }
        .executor { background: rgba(17,17,17,0.88); border: 1px solid var(--border); border-radius: 14px; padding: 24px; backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 20px; }
        textarea { width: 100%; height: 260px; background: rgba(10,10,10,0.95); border: 1px solid var(--border); border-radius: 10px; color: #cccccc; font-family: var(--font-mono); font-size: 0.87rem; padding: 18px; resize: none; outline: none; line-height: 1.55; }
        .controls { display: flex; gap: 14px; }
        .action-btn { flex: 1; background: none; border: 1px solid var(--accent); color: var(--accent); padding: 16px; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; border-radius: 8px; transition: all 0.3s; }
        .action-btn:hover { background: var(--accent); color: var(--bg); }
        .action-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NEIZ<br>404</h1>
            <p>REMOTE UGC EXECUTOR</p>
        </div>
        <div class="executor">
            <textarea id="scriptInput" spellcheck="false" placeholder="Paste your script here..."></textarea>
            <div class="controls">
                <button class="action-btn" onclick="sendScript()">SEND & EXECUTE</button>
                <button class="action-btn" onclick="clearScript()">CLEAR</button>
            </div>
        </div>
    </div>

    <script>
        function sendScript() {
            const input = document.getElementById('scriptInput').value.trim();
            if (input === "") return;
            navigator.clipboard.writeText(input).then(() => {
                const btn = document.querySelectorAll('.action-btn')[0];
                const original = btn.innerText;
                btn.innerText = "SENT ✓";
                setTimeout(() => btn.innerText = original, 1600);
            });
        }
        function clearScript() {
            document.getElementById('scriptInput').value = "";
            const btn = document.querySelectorAll('.action-btn')[1];
            const original = btn.innerText;
            btn.innerText = "CLEARED";
            setTimeout(() => btn.innerText = original, 1000);
        }
    </script>
</body>
</html>
